<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MeterSync — Track your utilities</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --bg2: #0e0e1a;
    --bg3: #14141f;
    --bg4: #1c1c2a;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --text: #eeeef8;
    --text2: #8888a8;
    --text3: #44445a;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
  }

  #root { position: relative; z-index: 1; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-10px); }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes shimmer {
    from { background-position: -400px 0; }
    to   { background-position: 400px 0; }
  }
  @keyframes dot-appear {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  .fade-up { animation: fadeUp 0.7s ease both; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.22s; }
  .delay-3 { animation-delay: 0.34s; }
  .delay-4 { animation-delay: 0.46s; }

  /* ── Glow blobs ── */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    opacity: 0.18;
  }

  /* ── macOS Window ── */
  .macos-window {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 40px 120px rgba(0,0,0,0.7),
      0 0 80px rgba(59,130,246,0.08);
    background: #0a0a12;
    animation: float 6s ease-in-out infinite;
  }
  .macos-titlebar {
    height: 38px;
    background: #111120;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .macos-dot {
    width: 12px; height: 12px; border-radius: 50%;
    animation: dot-appear 0.4s ease both;
  }
  .macos-dot.red   { background: #ff5f57; box-shadow: 0 0 6px #ff5f5788; animation-delay: 0s; }
  .macos-dot.yellow { background: #ffbd2e; box-shadow: 0 0 6px #ffbd2e88; animation-delay: 0.07s; }
  .macos-dot.green  { background: #28c840; box-shadow: 0 0 6px #28c84088; animation-delay: 0.14s; }
  .macos-title {
    flex: 1; text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text3);
    font-weight: 400;
    margin-right: 60px;
  }
  .macos-screenshot {
    width: 100%; display: block;
    object-fit: cover;
    transition: opacity 0.45s ease;
  }

  /* ── Screenshot dots ── */
  .carousel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2);
    border: none; cursor: pointer;
    padding: 0; transition: all 0.2s;
    flex-shrink: 0;
  }
  .carousel-dot.active {
    width: 20px; border-radius: 3px;
    background: var(--accent);
  }

  /* ── Feature card ── */
  .feature-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 26px;
    transition: border-color 0.25s, transform 0.25s;
    position: relative;
    overflow: hidden;
  }
  .feature-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(59,130,246,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feature-card:hover { border-color: var(--border2); transform: translateY(-3px); }
  .feature-card:hover::before { opacity: 1; }

  /* ── Download buttons ── */
  .dl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 24px; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; border: none; text-decoration: none;
    transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }
  .dl-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.07), transparent);
  }
  .dl-btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 8px 32px rgba(59,130,246,0.35);
  }
  .dl-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59,130,246,0.45); }
  .dl-btn-secondary {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .dl-btn-secondary:hover { background: var(--bg4); color: var(--text); transform: translateY(-2px); }

  /* ── Nav ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: rgba(8, 8, 16, 0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700;
    letter-spacing: -0.03em; color: var(--text); text-decoration: none;
  }
  .nav-logo-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-links {
    display: flex; gap: 28px; list-style: none;
  }
  .nav-links a {
    color: var(--text2); text-decoration: none; font-size: 14px;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--accent);
    color: #fff; border: none; border-radius: 10px;
    padding: 8px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
    box-shadow: 0 4px 16px rgba(59,130,246,0.3);
  }
  .nav-cta:hover { opacity: 0.85; }

  /* ── Badge ── */
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 99px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    font-size: 12px; color: #93c5fd;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3b82f6;
    position: relative;
  }
  .badge-dot::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: #3b82f6;
    animation: pulse-ring 1.8s ease-out infinite;
  }

  /* ── Section ── */
  .section { padding: 100px 48px; max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text3); margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(30px, 4vw, 46px);
    font-weight: 700; line-height: 1.1;
    letter-spacing: -0.03em;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 36px 48px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text3); font-size: 13px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px; background: linear-gradient(to right, transparent, var(--border2), transparent);
    margin: 0 48px;
  }

  /* ── Shimmer text ── */
  .shimmer-text {
    background: linear-gradient(90deg, #3b82f6 0%, #a78bfa 30%, #ec4899 60%, #3b82f6 100%);
    background-size: 400px 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
</style>
</head>
<body>
<div id="root"></div>

const IconChevronLeft = () => (

);
const IconChevronRight = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
);

// ─── macOS Window Carousel ────────────────────────────────────────────────────
function MacOSWindow() {
  const [idx, setIdx] = useState(0);
  const [fading, setFading] = useState(false);
  const timerRef = useRef(null);

  const goTo = useCallback((next) => {
    setFading(true);
    setTimeout(() => {
      setIdx((next + SCREENSHOTS.length) % SCREENSHOTS.length);
      setFading(false);
    }, 220);
  }, []);

  useEffect(() => {
    timerRef.current = setInterval(() => goTo(idx + 1), 4500);
    return () => clearInterval(timerRef.current);
  }, [idx, goTo]);

  const current = SCREENSHOTS[idx];

  return (
    <div style={{ position: 'relative' }}>
      {/* Window frame */}
      <div className="macos-window" style={{ maxWidth: 880, margin: '0 auto' }}>
        <div className="macos-titlebar">
          <div className="macos-dot red" />
          <div className="macos-dot yellow" />
          <div className="macos-dot green" />
          <span className="macos-title">{current.label}</span>
        </div>
        <div style={{ position: 'relative', background: '#080810', lineHeight: 0 }}>
          <img
            src={current.src}
            alt={current.label}
            className="macos-screenshot"
            style={{ opacity: fading ? 0 : 1 }}
          />
          {/* Arrows */}
          <button
            onClick={() => { clearInterval(timerRef.current); goTo(idx - 1); }}
            style={{
              position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)',
              background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)',
              border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10,
              width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center',
              cursor: 'pointer', color: '#fff', transition: 'background 0.15s'
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(59,130,246,0.4)'}
            onMouseLeave={e => e.currentTarget.style.background = 'rgba(0,0,0,0.5)'}
          >
            <IconChevronLeft />
          </button>
          <button
            onClick={() => { clearInterval(timerRef.current); goTo(idx + 1); }}
            style={{
              position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)',
              background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)',
              border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10,
              width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center',
              cursor: 'pointer', color: '#fff', transition: 'background 0.15s'
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(59,130,246,0.4)'}
            onMouseLeave={e => e.currentTarget.style.background = 'rgba(0,0,0,0.5)'}
          >
            <IconChevronRight />
          </button>
        </div>
      </div>

      {/* Caption + Dots */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14, marginTop: 22 }}>
        <div style={{ color: 'var(--text2)', fontSize: 13, height: 18, transition: 'opacity 0.3s', opacity: fading ? 0 : 1 }}>
          {current.caption}
        </div>
        <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
          {SCREENSHOTS.map((_, i) => (
            <button
              key={i}
              className={`carousel-dot ${i === idx ? 'active' : ''}`}
              onClick={() => { clearInterval(timerRef.current); goTo(i); }}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Feature Card ─────────────────────────────────────────────────────────────
function FeatureCard({ icon, title, desc, accentColor = '#3b82f6' }) {

        background: accentColor + '18',

      <div style={{ fontFamily: 'Outfit', fontSize: 16, fontWeight: 600, marginBottom: 8 }}>{title}</div>
      <div style={{ color: 'var(--text2)', fontSize: 14, lineHeight: 1.65 }}>{desc}</div>
    </div>
  );
}
