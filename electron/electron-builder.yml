appId: com.hackmajoris.counters
productName: MeterSync
directories:
  output: release
files:
  - dist/**/*
mac:
  category: public.app-category.developer-tools
  identity: null
  gatekeeperAssess: false
  extraResources:
    - from: "bin/server"
      to: "server"
    - from: "../pkg/web/dist"
      to: "web/dist"
win:
  target: nsis
  extraResources:
    - from: "bin/server.exe"
      to: "server.exe"
    - from: "../pkg/web/dist"
      to: "web/dist"
linux:
  target: AppImage
  extraResources:
    - from: "bin/server"
      to: "server"
    - from: "../pkg/web/dist"
      to: "web/dist"
