appId: com.hackmajoris.counters
productName: counters
directories:
  output: dist
files:
  - dist/**/*
mac:
  category: public.app-category.developer-tools
  extraResources:
    - from: "../.bin/server"
      to: ".bin/server"
win:
  target: nsis
  extraResources:
    - from: "../.bin/server.exe"
      to: ".bin/server.exe"
linux:
  target: AppImage
  extraResources:
    - from: "../.bin/server"
      to: ".bin/server"
