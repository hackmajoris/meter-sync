version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - revive
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.Stmt).Close
        - (*database/sql.DB).Close
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - web/node_modules

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hackmajoris/meter-sync
  exclusions:
    paths:
      - web/node_modules
