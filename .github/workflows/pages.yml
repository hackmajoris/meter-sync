name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Inject version into HTML
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${VERSION}"
          REPO="hackmajoris/meter-sync"
          BASE="https://github.com/${REPO}"

          sed \
            -e "s|__TAG__|${TAG}|g" \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__REPO_URL__|${BASE}|g" \
            -e "s|__DMG_URL__|${BASE}/releases/download/${TAG}/MeterSync-arm64.dmg|g" \
            -e "s|__WIN_URL__|${BASE}/releases/download/${TAG}/MeterSync-Setup-x64.exe|g" \
            -e "s|__RELEASES_URL__|${BASE}/releases/tag/${TAG}|g" \
            -e "s|__ISSUES_URL__|${BASE}/issues|g" \
            site/index.html > site/index.out.html

          mv site/index.out.html site/index.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
