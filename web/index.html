<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeterSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
    <style>
      html, body { margin: 0; padding: 0; background: #0d0d12; height: 100%; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0d0d12;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-wordmark {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
        color: #f0f0f8;
      }
      #splash-spinner {
        width: 28px; height: 28px;
        border: 2px solid rgba(255,255,255,0.08);
        border-top-color: rgba(255,255,255,0.45);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-wordmark">MeterSync</div>
      <div id="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      // Remove splash once React has rendered something into #root
      const splash = document.getElementById('splash');
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').firstChild) {
          splash.classList.add('hide');
          setTimeout(() => splash.remove(), 280);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
